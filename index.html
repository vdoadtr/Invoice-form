<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakibul's Personal Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans m-0 p-0">

    <!-- আধুনিক নেভিগেশন বার -->
    <nav class="flex justify-between items-center px-8 py-4 bg-black/50 backdrop-blur-md sticky top-0 z-50 border-b border-gray-800">
        <div class="text-2xl font-bold tracking-tight">
            <a href="index.html" class="hover:text-cyan-400 transition-colors">Home</a>
        </div>
        
        <div class="hidden md:flex items-center space-x-8">
            <a href="#" class="text-gray-300 hover:text-white transition-colors">About me</a>
            <a href="#" class="text-gray-300 hover:text-white transition-colors">My projects</a>
            <button onclick="openAI()" class="bg-cyan-600 hover:bg-cyan-500 text-white px-5 py-2 rounded-full font-semibold transition-all transform hover:scale-105 shadow-lg shadow-cyan-500/20">
                ✨ Ask everything with AI
            </button>
        </div>

        <div class="md:hidden">
            <button class="text-white" onclick="alert('Menu clicked!')">☰</button>
        </div>
    </nav>

    <!-- মেইন কন্টেন্ট এরিয়া -->
    <main class="flex flex-col items-center justify-center min-h-[85vh] p-10 text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent italic">
            স্বাগতম রাকিবুল!
        </h1>
        <p class="text-gray-400 max-w-2xl text-lg md:text-xl leading-relaxed">
            তোমার ওয়েবসাইট এখন গিটহাবে লাইভ। এআই চ্যাটবক্সটি চেক করার জন্য নিচে ক্লিক করো। 🚀
        </p>
        <div class="mt-10 flex gap-4">
            <button onclick="openAI()" class="bg-cyan-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-cyan-500 transition-all shadow-lg shadow-cyan-500/30">Start AI Chat</button>
        </div>
    </main>

    <!-- AI চ্যাট বক্স (Modal) -->
    <div id="ai-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-gray-800 w-full max-w-md rounded-2xl shadow-2xl border border-gray-700 overflow-hidden flex flex-col">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-900">
                <h3 class="text-lg font-bold text-cyan-400 flex items-center gap-2">
                    <span class="animate-pulse">✨</span> জেমিনি এআই অ্যাসিস্ট্যান্ট
                </h3>
                <button onclick="closeAI()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            
            <div id="chat-history" class="h-80 overflow-y-auto p-4 space-y-4 text-sm bg-gray-900/50">
                <div class="bg-gray-700/50 p-3 rounded-lg border border-gray-600 self-start max-w-[90%] text-gray-200">
                    হ্যালো রাকিবুল! আমি তোমার পার্সোনাল এআই। আমি এখন উত্তর দিতে প্রস্তুত। 😊
                </div>
            </div>

            <div class="p-4 bg-gray-900 border-t border-gray-700">
                <div class="flex gap-2">
                    <input type="text" id="user-input" placeholder="যেকোনো প্রশ্ন লিখুন..." 
                        class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500 text-white text-sm">
                    <button id="send-btn" onclick="askGemini()" 
                        class="bg-cyan-600 hover:bg-cyan-500 px-4 py-2 rounded-lg transition-colors font-bold text-sm text-white">
                        পাঠান
                    </button>
                </div>
                <div id="loading" class="hidden text-[10px] text-cyan-500 mt-2 italic animate-pulse text-center">জেমিনি উত্তর তৈরি করছে...</div>
            </div>
        </div>
    </div>

    <script>
        function openAI() { 
            document.getElementById('ai-modal').classList.remove('hidden');
            document.getElementById('user-input').focus();
        }
        function closeAI() { document.getElementById('ai-modal').classList.add('hidden'); }

        async function askGemini() {
            const inputField = document.getElementById('user-input');
            const chatHistory = document.getElementById('chat-history');
            const loading = document.getElementById('loading');
            const userText = inputField.value.trim();

            if (!userText) return;

            // ইউজার মেসেজ রেন্ডার
            chatHistory.innerHTML += `
                <div class="flex justify-end">
                    <div class="bg-cyan-700 p-3 rounded-lg max-w-[85%] text-white shadow-md">
                        ${userText}
                    </div>
                </div>`;
            
            inputField.value = '';
            loading.classList.remove('hidden');
            chatHistory.scrollTop = chatHistory.scrollHeight;

            // তোমার নতুন আপডেট করা API Key
            const apiKey = "AIzaSyAAobk4RwpKC1w68uMIbOBd-vch0iqIBwg"; 
            
            // স্টেবল মডেল পাথ
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

            const payload = {
                contents: [{ parts: [{ text: userText }] }]
            };

            let retries = 0;
            const maxRetries = 3;

            async function fetchWithRetry() {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        console.error("Gemini API Error Detail:", errorData);
                        
                        // যদি 404 আসে, তবে অন্য একটি কমন এন্ডপয়েন্ট ট্রাই করবে
                        if (response.status === 404) {
                            const fallbackUrl = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${apiKey}`;
                            const fallbackResponse = await fetch(fallbackUrl, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });
                            if (fallbackResponse.ok) {
                                const fbData = await fallbackResponse.json();
                                return fbData.candidates?.[0]?.content?.parts?.[0]?.text;
                            }
                        }

                        if (retries < maxRetries) {
                            retries++;
                            await new Promise(res => setTimeout(res, 1000 * retries));
                            return fetchWithRetry();
                        }
                        throw new Error(errorData.error?.message || 'API Error');
                    }

                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    console.error("Fetch attempt failed:", error);
                    return null;
                }
            }

            const aiResponse = await fetchWithRetry();
            loading.classList.add('hidden');

            if (aiResponse) {
                chatHistory.innerHTML += `
                    <div class="flex justify-start">
                        <div class="bg-gray-700 p-3 rounded-lg max-w-[85%] border border-gray-700 shadow-md text-gray-200">
                            ${aiResponse}
                        </div>
                    </div>`;
            } else {
                chatHistory.innerHTML += `<div class="text-red-400 text-center text-[10px] mt-2 italic font-bold">এপিআই কি (API Key) সঠিক কি না তা চেক করো। অথবা কিছুক্ষণ পর আবার চেষ্টা করো। 😟</div>`;
            }
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') askGemini();
        });
    </script>
</body>
</html>
