<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakibul's Personal Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans m-0 p-0">

    <!-- আধুনিক নেভিগেশন বার -->
    <nav class="flex justify-between items-center px-8 py-4 bg-black/50 backdrop-blur-md sticky top-0 z-50 border-b border-gray-800">
        <div class="text-2xl font-bold tracking-tight">
            <a href="/" class="hover:text-cyan-400 transition-colors">Home</a>
        </div>
        
        <div class="hidden md:flex items-center space-x-8">
            <a href="/about-me" class="text-gray-300 hover:text-white transition-colors">About me</a>
            <a href="/my-projects" class="text-gray-300 hover:text-white transition-colors">My projects</a>
            <button onclick="openAI()" class="bg-cyan-600 hover:bg-cyan-500 text-white px-5 py-2 rounded-full font-semibold transition-all transform hover:scale-105 shadow-lg shadow-cyan-500/20">
                ✨ Ask everything with AI
            </button>
        </div>

        <!-- মোবাইল মেনু বাটন -->
        <div class="md:hidden">
            <button class="text-white">☰</button>
        </div>
    </nav>

    <!-- মেইন কন্টেন্ট এরিয়া -->
    <main class="flex flex-col items-center justify-center min-height-[80vh] p-10 text-center">
        <h1 class="text-5xl font-extrabold mb-4 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
            স্বাগতম রাকিবুল!
        </h1>
        <p class="text-gray-400 max-w-xl text-lg">
            এটি তোমার নতুন গিটহাব ওয়েবসাইট। এখন থেকে তুমি তোমার প্রোজেক্টগুলো এখানে সুন্দরভাবে সাজিয়ে রাখতে পারবে।
        </p>
    </main>

    <!-- AI চ্যাট বক্স (Modal) -->
    <div id="ai-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-gray-800 w-full max-w-md rounded-2xl shadow-2xl border border-gray-700 overflow-hidden">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-900">
                <h3 class="text-lg font-bold text-cyan-400 flex items-center gap-2">
                    <span class="animate-pulse">✨</span> জেমিনি এআই অ্যাসিস্ট্যান্ট
                </h3>
                <button onclick="closeAI()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            
            <div id="chat-history" class="h-80 overflow-y-auto p-4 space-y-4 text-sm scrollbar-thin scrollbar-thumb-gray-600">
                <div class="bg-gray-700/50 p-3 rounded-lg border border-gray-600 self-start max-w-[85%]">
                    স্বাগতম! আমি জেমিনি এআই। রাকিবুলের ওয়েবসাইটে আপনাকে সাহায্য করতে পেরে আমি আনন্দিত।
                </div>
            </div>

            <div class="p-4 bg-gray-900 border-t border-gray-700">
                <div class="flex gap-2">
                    <input type="text" id="user-input" placeholder="যেকোনো প্রশ্ন লিখুন..." 
                        class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500 text-white">
                    <button id="send-btn" onclick="askGemini()" 
                        class="bg-cyan-600 hover:bg-cyan-500 px-4 py-2 rounded-lg transition-colors font-bold">
                        পাঠান
                    </button>
                </div>
                <div id="loading" class="hidden text-xs text-cyan-500 mt-2 italic animate-pulse">এআই চিন্তা করছে...</div>
            </div>
        </div>
    </div>

    <script>
        function openAI() { document.getElementById('ai-modal').classList.remove('hidden'); }
        function closeAI() { document.getElementById('ai-modal').classList.add('hidden'); }

        async function askGemini() {
            const inputField = document.getElementById('user-input');
            const chatHistory = document.getElementById('chat-history');
            const loading = document.getElementById('loading');
            const userText = inputField.value.trim();

            if (!userText) return;

            // ইউজার মেসেজ যোগ করা
            chatHistory.innerHTML += `
                <div class="flex justify-end">
                    <div class="bg-cyan-700 p-3 rounded-lg max-w-[85%] text-white shadow-md">
                        ${userText}
                    </div>
                </div>`;
            
            inputField.value = '';
            loading.classList.remove('hidden');
            chatHistory.scrollTop = chatHistory.scrollHeight;

            const apiKey = ""; // Runtime-এ ইনজেক্ট হবে
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userText }] }],
                        systemInstruction: { parts: [{ text: "You are a helpful AI assistant for Rakibul's GitHub website. Respond in Bengali with a friendly tone." }] }
                    })
                });

                const data = await response.json();
                const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "দুঃখিত, কোনো উত্তর পাওয়া যায়নি।";
                
                chatHistory.innerHTML += `
                    <div class="flex justify-start">
                        <div class="bg-gray-700 p-3 rounded-lg max-w-[85%] border border-gray-600 shadow-md">
                            ${aiResponse}
                        </div>
                    </div>`;
                chatHistory.scrollTop = chatHistory.scrollHeight;
            } catch (error) {
                chatHistory.innerHTML += `<div class="text-red-400 text-center text-xs">কানেকশন এরর! আবার চেষ্টা করুন।</div>`;
            } finally {
                loading.classList.add('hidden');
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') askGemini();
        });
    </script>
</body>
</html>
